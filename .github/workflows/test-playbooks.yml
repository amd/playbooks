name: Test Playbooks

on:
  workflow_dispatch:
    inputs:
      playbook_id:
        description: 'Specific playbook ID to test'
        required: true
        type: string
      arch:
        description: 'Device/arch label used by the playbook metadata (e.g., gfx90a, mi300x, etc.)'
        required: true
        type: string
      runner_label:
        description: 'Label of runner'
        required: true
        type: string

jobs:
  test-playbooks:
    name: "Test ${{ inputs.playbook_id }} (${{ inputs.arch }})"
    runs-on: ${{ inputs.runner_label }}
    env:
      PYTHONUTF8: 1
      PYTHONIOENCODING: utf-8

    steps:
      - name: Detect runner OS
        id: os
        shell: bash
        run: |
          # GitHub exposes RUNNER_OS as Windows/Linux/macOS
          os="${RUNNER_OS:-}"
          os_lc="$(echo "$os" | tr '[:upper:]' '[:lower:]')"

          if [ "$os_lc" = "windows" ]; then
            echo "platform=windows" >> "$GITHUB_OUTPUT"
          elif [ "$os_lc" = "linux" ]; then
            echo "platform=linux" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unsupported runner OS: '$os'"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Extract and run tests (Windows)
        if: steps.os.outputs.platform == 'windows'
        shell: powershell
        run: |
          python .github/scripts/run_playbook_tests.py --playbook "${{ inputs.playbook_id }}" --platform windows --device "${{ inputs.arch }}"

      - name: Extract and run tests (Linux)
        if: steps.os.outputs.platform == 'linux'
        shell: bash
        run: |
          python .github/scripts/run_playbook_tests.py --playbook "${{ inputs.playbook_id }}" --platform linux --device "${{ inputs.arch }}"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.playbook_id }}-${{ steps.os.outputs.platform }}-${{ inputs.arch }}
          path: test-results/
          if-no-files-found: ignore
