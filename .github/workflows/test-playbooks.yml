name: Test Playbooks

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      playbook_id:
        description: 'Specific playbook ID to test (leave empty to test all playbooks)'
        required: false
        type: string
      runner_label:
        description: 'Optional: run on a specific self-hosted runner label (example: 10.23.80.221). Leave empty to use matrix runner.'
        required: false
        default: ''
        type: string
  pull_request:
    paths:
      - 'playbooks/**'

jobs:
  detect-changes:
    name: Detect Changed Playbooks
    runs-on: ubuntu-latest
    outputs:
      playbooks: ${{ steps.detect.outputs.playbooks }}
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_entries: ${{ steps.build-matrix.outputs.has_entries }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed playbooks
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.playbook_id }}" ]; then
            echo "playbooks=[\"${{ github.event.inputs.playbook_id }}\"]" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- 'playbooks/core/*' 'playbooks/supplemental/*' 2>/dev/null || echo "")
            
            PLAYBOOK_IDS=$(echo "$CHANGED_FILES" | grep -E '^playbooks/(core|supplemental)/[^/]+/' | sed 's|playbooks/[^/]*/\([^/]*\)/.*|\1|' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            
            if [ "$PLAYBOOK_IDS" = "[]" ] || [ -z "$PLAYBOOK_IDS" ]; then
              echo "playbooks=[]" >> $GITHUB_OUTPUT
            else
              echo "playbooks=$PLAYBOOK_IDS" >> $GITHUB_OUTPUT
            fi
          else
            ALL_PLAYBOOKS=$(find playbooks/core playbooks/supplemental -mindepth 1 -maxdepth 1 -type d 2>/dev/null | sed 's|playbooks/[^/]*/||' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            
            if [ "$ALL_PLAYBOOKS" = "[]" ] || [ -z "$ALL_PLAYBOOKS" ]; then
              echo "playbooks=[]" >> $GITHUB_OUTPUT
            else
              echo "playbooks=$ALL_PLAYBOOKS" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Build test matrix from playbook metadata
        id: build-matrix
        env:
          PLAYBOOKS: ${{ steps.detect.outputs.playbooks }}
        run: |
          if [ "$PLAYBOOKS" = "[]" ] || [ -z "$PLAYBOOKS" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "has_entries=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          MATRIX=$(python3 << 'PYEOF'
          import json, os
          from pathlib import Path

          playbooks = json.loads(os.environ["PLAYBOOKS"])
          matrix = []

          for pb_id in playbooks:
              for cat in ["core", "supplemental"]:
                  pb_file = Path(f"playbooks/{cat}/{pb_id}/playbook.json")
                  if pb_file.exists():
                      meta = json.loads(pb_file.read_text())
                      archs = meta.get("tested_platforms", {})
                      if not archs:
                          for p in meta.get("platforms", []):
                              archs[p] = ["halo"]
                      for platform, arch_list in archs.items():
                          for arch in arch_list:
                              os_label = "Windows" if platform == "windows" else "Linux"
                              matrix.append({
                                  "playbook": pb_id,
                                  "platform": platform,
                                  "arch": arch,
                                  "runner": json.dumps(["self-hosted", os_label, arch]),
                              })
                      break

          print(json.dumps(matrix))
          PYEOF
          )

          if [ "$MATRIX" = "[]" ] || [ -z "$MATRIX" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "has_entries=false" >> $GITHUB_OUTPUT
          else
            echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
            echo "has_entries=true" >> $GITHUB_OUTPUT
          fi

      - name: Display test matrix
        run: |
          echo "Test matrix: ${{ steps.build-matrix.outputs.matrix }}"

  test-playbooks:
    name: "Test ${{ matrix.playbook }} (${{ matrix.platform }}/${{ matrix.arch }})"
    needs: detect-changes
    # if: needs.detect-changes.outputs.has_entries == 'true'
    if: needs.detect-changes.outputs.has_entries == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.runner_label == '')
    # runs-on: ${{ fromJson(matrix.runner) }}
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.runner_label != '' && fromJson(format('["self-hosted","{0}"]', github.event.inputs.runner_label))) || fromJson(matrix.runner) }}
    env:
      PYTHONUTF8: 1
      PYTHONIOENCODING: utf-8
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Extract and run tests (Windows)
        if: matrix.platform == 'windows'
        id: run_tests_windows
        shell: powershell
        run: |
          python .github/scripts/run_playbook_tests.py --playbook "${{ matrix.playbook }}" --platform windows --device "${{ matrix.arch }}"

      - name: Extract and run tests (Linux)
        if: matrix.platform == 'linux'
        id: run_tests_linux
        shell: bash
        run: |
          python .github/scripts/run_playbook_tests.py --playbook "${{ matrix.playbook }}" --platform linux --device "${{ matrix.arch }}"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.playbook }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: test-results/
          if-no-files-found: ignore

      - name: Test Summary (Windows)
        if: always() && matrix.platform == 'windows'
        shell: powershell
        run: |
          $summary = @"
          ### Test Results for ``${{ matrix.playbook }}`` (${{ matrix.platform }}/${{ matrix.arch }})
          
          See the test artifacts for detailed logs.
          "@
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

      - name: Test Summary (Linux)
        if: always() && matrix.platform == 'linux'
        shell: bash
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ### Test Results for `${{ matrix.playbook }}` (${{ matrix.platform }}/${{ matrix.arch }})

          See the test artifacts for detailed logs.
          EOF


  test-playbooks-single:
    name: "Test Playbooks (Single Runner Override)"
    needs: detect-changes
    if: needs.detect-changes.outputs.has_entries == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.runner_label != ''
    runs-on: ${{ fromJson(format('["self-hosted","{0}"]', github.event.inputs.runner_label)) }}
    env:
      PYTHONUTF8: 1
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      # -------- Windows runner path --------
      - name: Run tests (Windows runner)
        if: runner.os == 'Windows'
        shell: powershell
        env:
          PLAYBOOKS_JSON: ${{ needs.detect-changes.outputs.playbooks }}
        run: |
          $platform = "windows"
          $playbooks = $env:PLAYBOOKS_JSON | ConvertFrom-Json

          foreach ($pb in $playbooks) {
            $pbPathCore = "playbooks/core/$pb/playbook.json"
            $pbPathSupp = "playbooks/supplemental/$pb/playbook.json"

            if (Test-Path $pbPathCore) { $pbPath = $pbPathCore }
            elseif (Test-Path $pbPathSupp) { $pbPath = $pbPathSupp }
            else { throw "playbook.json not found for playbook '$pb' in core/ or supplemental/." }

            $meta = Get-Content $pbPath -Raw | ConvertFrom-Json

            # Pick device for this runner's OS from tested_platforms.
            # If multiple, prefer "halo" if present, else pick first.
            $devices = @()
            if ($meta.tested_platforms -and $meta.tested_platforms.$platform) {
              $devices = $meta.tested_platforms.$platform
            }

            if (-not $devices -or $devices.Count -eq 0) {
              $device = "halo"
            } elseif ($devices -contains "halo") {
              $device = "halo"
            } else {
              $device = $devices[0]
            }

            Write-Host "Running tests for playbook=$pb platform=$platform device=$device on runner=${{ github.event.inputs.runner_label }}"
            python .github/scripts/run_playbook_tests.py --playbook "$pb" --platform windows --device "$device"
          }

      # -------- Linux runner path --------
      - name: Run tests (Linux runner)
        if: runner.os == 'Linux'
        shell: bash
        env:
          PLAYBOOKS_JSON: ${{ needs.detect-changes.outputs.playbooks }}
        run: |
          platform="linux"
          python - << 'PY'
          import json, os, subprocess
          from pathlib import Path

          platform = os.environ.get("platform", "linux")
          playbooks = json.loads(os.environ["PLAYBOOKS_JSON"])

          def find_pb_json(pb):
              p1 = Path(f"playbooks/core/{pb}/playbook.json")
              p2 = Path(f"playbooks/supplemental/{pb}/playbook.json")
              if p1.exists(): return p1
              if p2.exists(): return p2
              raise FileNotFoundError(f"playbook.json not found for playbook '{pb}' in core/ or supplemental/.")

          for pb in playbooks:
              meta = json.loads(find_pb_json(pb).read_text())
              devices = (meta.get("tested_platforms") or {}).get(platform, []) or []

              # Prefer halo if multiple; else first; else fallback halo.
              if not devices:
                  device = "halo"
              elif "halo" in devices:
                  device = "halo"
              else:
                  device = devices[0]

              print(f"Running tests for playbook={pb} platform={platform} device={device}")
              subprocess.check_call([
                  "python", ".github/scripts/run_playbook_tests.py",
                  "--playbook", pb,
                  "--platform", platform,
                  "--device", device
              ])
          PY

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-single-runner-${{ github.event.inputs.runner_label }}
          path: test-results/
          if-no-files-found: ignore
