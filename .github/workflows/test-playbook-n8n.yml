name: Test n8n Playbook Script (Windows, Conda)

on:
  workflow_dispatch: 
  pull_request:

jobs:
  test-n8n-playbook-windows:
    name: Test Playbooks - n8n-automation-gpt-oss
    runs-on: [self-hosted, windows]
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate n8n playbook
        shell: pwsh
        run: | 
          python playbooks/core/n8n-automation-gpt-oss/playbook.py

      - name: Display summary
        if: success()
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY "### ✅ n8n Playbook Test Passed"
